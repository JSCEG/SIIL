<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Gestor de Documentos SIIL | SENER</title>

    <!-- Google Fonts - Noto Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/base-theme.css">
    <link rel="stylesheet" href="css/shared-header.css">
    <link rel="stylesheet" href="css/shared-breadcrumbs.css">
    <link rel="stylesheet" href="css/shared-bottom-nav.css">
    <link rel="stylesheet" href="css/dashboard-styles.css">
</head>

<body>
    <site-header></site-header>
    <site-breadcrumbs></site-breadcrumbs>

    <!-- Main Content -->
    <main class="main-content" style="padding-bottom: 6rem;">
        <div class="container">
            <div class="dashboard-header">
                <h1>Gestor de Documentos SIIL</h1>
                <p>Sistema Integral de Información del Litio</p>
            </div>

            <div class="dashboard-grid">
                <div class="dashboard-card">
                    <div class="card-icon">
                        <i class="fas fa-folder-open"></i>
                    </div>
                    <h3>Documentos</h3>
                    <p>Gestionar archivos y documentos del proyecto</p>
                    <button class="btn btn-primary">Acceder</button>
                </div>

                <div class="dashboard-card">
                    <div class="card-icon">
                        <i class="fas fa-chart-bar"></i>
                    </div>
                    <h3>Reportes</h3>
                    <p>Visualizar reportes y estadísticas</p>
                    <button class="btn btn-primary">Acceder</button>
                </div>

                <div class="dashboard-card">
                    <div class="card-icon">
                        <i class="fas fa-users"></i>
                    </div>
                    <h3>Usuarios</h3>
                    <p>Administración de usuarios del sistema</p>
                    <button class="btn btn-primary">Acceder</button>
                </div>

                <div class="dashboard-card">
                    <div class="card-icon">
                        <i class="fas fa-cog"></i>
                    </div>
                    <h3>Configuración</h3>
                    <p>Ajustes del sistema y preferencias</p>
                    <button class="btn btn-primary">Acceder</button>
                </div>
            </div>
        </div>
    </main>

    <site-bottom-nav></site-bottom-nav>

    <!-- JavaScript -->
    <script src="js/preloader.js"></script>
    <script src="js/login.js"></script>
    <script src="js/shared-layout.js"></script>
    <script src="js/shared-breadcrumbs.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
